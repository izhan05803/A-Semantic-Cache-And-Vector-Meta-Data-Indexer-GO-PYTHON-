apiVersion: apps/v1
kind: Deployment
metadata:
  name: indexer
  namespace: semantic-cache
  labels:
    app: indexer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: indexer
  template:
    metadata:
      labels:
        app: indexer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: indexer
          image: ghcr.io/izhan05803/semantic-cache-indexer:main
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8000
              name: metrics
          envFrom:
            - configMapRef:
                name: indexer-config
            - secretRef:
                name: indexer-secret
          volumeMounts:
            - name: chroma-data
              mountPath: /data
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: chroma-pvc
